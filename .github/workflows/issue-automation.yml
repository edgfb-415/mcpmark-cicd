name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run issue triage
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';

            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-triage']
            });

            // Assign category labels based on title
            const categoryLabels = [];
            if (title.includes('bug')) {
              categoryLabels.push('bug');
            }
            if (title.includes('epic')) {
              categoryLabels.push('epic');
            }
            if (title.includes('maintenance')) {
              categoryLabels.push('maintenance');
            }

            if (categoryLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: categoryLabels
              });
            }

            // Assign priority labels based on title or body
            const priorityKeywords = {
              'critical': ['critical', 'urgent', 'production', 'outage'],
              'high': ['important', 'high', 'blocking'],
              'medium': ['medium', 'normal'],
              'low': ['low', 'nice-to-have', 'minor']
            };

            let priorityLabel = 'priority-medium'; // Default

            // Check for highest priority first
            if (Object.values(priorityKeywords.critical).some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-critical';
            } else if (Object.values(priorityKeywords.high).some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-high';
            } else if (Object.values(priorityKeywords.low).some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-low';
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const originalTitle = issue.title;

            // Define subtask names
            const subtasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            // Create subtasks
            const subtaskNumbers = [];
            for (let i = 0; i < subtasks.length; i++) {
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${i + 1}: ${subtasks[i]}`;
              const subtaskBody = `Related to #${issueNumber}`;

              const subtask = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(subtask.data.number);
            }

            // Update parent issue body with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const updatedBody = `${issue.body || ''}\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: task-breakdown
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const author = issue.user.login;

            // Check if author is first-time contributor in this repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });

            const isFirstTime = authorIssues.data.length === 1; // Only this issue

            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });

              // Post welcome message
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Welcome @${author}! This is your first issue in this repository. Thank you for contributing!`
              });
            }

            // Determine issue type and post appropriate response
            const labels = issue.labels.map(label => label.name);
            let responseBody = '';

            if (labels.includes('bug')) {
              responseBody = '### Bug Report Guidelines\nPlease ensure you have provided all necessary details to reproduce the bug, including steps, environment information, and screenshots if applicable.';
            } else if (labels.includes('epic')) {
              responseBody = '### Feature Request Process\nThis epic will be broken down into subtasks. Please review the subtasks created and provide any additional details needed.';
            } else if (labels.includes('maintenance')) {
              responseBody = '### Maintenance Guidelines\nPlease provide any additional context about the maintenance task, including dependencies or specific areas to focus on.';
            }

            if (responseBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: responseBody
              });
            }

            // Set milestone for high/critical priority issues
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Get milestone ID for v1.0.0 (assuming it exists; if not, this will fail, but user can create it)
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });

              const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (v1Milestone) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  milestone: v1Milestone.number
                });
              }
            }

            // Update status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'needs-triage'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });